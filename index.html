<!DOCTYPE html>
<html lang="en" data-app="diamond-mind">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F8F9FB" />
  <meta name="description" content="Diamond Mind — baseball player-development platform: roster, drill library, coaching sessions, assessments, games, season stats, Pitch Smart arm safety, and training programs." />
  <title>Diamond Mind</title>

  <!-- Favicon = brand logo -->
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />

  <!-- Fonts: Geist + Geist Mono (tabular figures, slashed zero) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <!-- Left sidebar rail (desktop) / bottom tab bar (mobile) -->
    <aside class="sidebar">
      <a class="brand" href="#/dashboard" aria-label="Diamond Mind home">
        <span class="brand-tile"><i data-lucide="diamond"></i></span>
        <span class="brand-name">Diamond Mind<small>Player development</small></span>
      </a>

      <!-- Nav: built dynamically by the router from registered views -->
      <nav id="view-tabs" class="view-tabs" aria-label="Sections"></nav>

      <div class="sidebar-tools">
        <button id="btn-export" class="btn btn-sm btn-ghost" type="button" title="Export all data as JSON"><i data-lucide="download"></i>Export</button>
        <button id="btn-import" class="btn btn-sm btn-ghost" type="button" title="Import data from JSON"><i data-lucide="upload"></i>Import</button>
        <button id="btn-clear" class="btn btn-sm btn-ghost" type="button" title="Erase all data and start over"><i data-lucide="trash-2"></i>Start fresh</button>
        <p class="sidebar-foot">Data stays in your browser (localStorage). Youth-safety first (Pitch Smart).</p>
      </div>
    </aside>

    <div class="app-main">
      <!-- Global header: alerts bell + count badge (opens a dropdown panel).
           "Alerts" is no longer a nav destination — it lives here. -->
      <header class="app-header">
        <div class="app-header-inner">
          <div class="app-header-spacer"></div>
          <!-- Quick-log "+": 3-item popover — lesson / assessment / program session -->
          <div class="quick-add-wrap">
            <button id="quick-add" class="alerts-bell quick-add-btn" type="button" aria-label="Quick log" aria-haspopup="true" aria-expanded="false">
              <i data-lucide="plus"></i>
            </button>
            <div id="quick-add-panel" class="alerts-panel quick-add-panel" role="menu" hidden></div>
          </div>
          <div class="alerts-bell-wrap">
            <button id="alerts-bell" class="alerts-bell" type="button" aria-label="Alerts" aria-haspopup="true" aria-expanded="false">
              <i data-lucide="bell"></i>
              <span id="alerts-badge" class="alerts-badge" hidden>0</span>
            </button>
            <div id="alerts-panel" class="alerts-panel" role="menu" hidden></div>
          </div>
        </div>
      </header>

      <main id="view-root" class="view" aria-live="polite">
        <!-- Active view is rendered here by the router -->
      </main>

      <footer class="site-footer">
        <p>Diamond Mind &middot; player-development platform &middot; data stays in your browser &middot; youth-safety first (Pitch Smart)</p>
      </footer>
    </div>

    <!-- Mobile quick-log FAB (elevated center '+') -->
    <button id="quick-log" class="quick-log-fab" type="button" aria-label="Log a coaching session"><i data-lucide="plus"></i></button>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root" aria-live="assertive"></div>

  <!-- CDN libs (no build step) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Foundation scripts (order matters) -->
  <script src="js/constants.js"></script>
  <script src="js/model.js"></script>
  <script src="js/benchmarks.js"></script>
  <script src="js/programs-data.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/pitchsmart.js"></script>
  <script src="js/migrate.js"></script>   <!-- one-way coachTracker.v2 -> diamondMind.v3 (used by store + io) -->
  <script src="js/store.js"></script>
  <script src="js/drills-seed.js"></script>     <!-- canonical seeded drill library (CT.seeds) -->
  <script src="js/generator-data.js"></script>  <!-- generator decision table (data only) -->
  <script src="js/generator.js"></script>       <!-- program generator engine (CT.generator) -->
  <script src="js/io.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>

  <!-- Feature views: each nav view calls CT.registerView() on load (registration
       order = sidebar order). Child views (drill library, program builder, season)
       expose their render on CT.views and are hosted inside the Programs/Games
       views instead of being nav destinations; session-log.js is the shared
       Log-Session modal (CT.sessionLog). Hidden views (player profile, alerts)
       register with { hidden:true }: routable, but not in the nav.
       The router try/catches each render so one broken view never blanks the app. -->
  <script src="js/views/dashboard.js"></script>       <!-- nav 1: status dashboard + Today panel -->
  <script src="js/views/players.js"></script>         <!-- nav 2: roster (flat cards) -->
  <script src="js/views/assess.js"></script>          <!-- nav 3: Assessments (modular flow + history) -->
  <script src="js/views/session-log.js"></script>     <!-- shared Log-Session modal (CT.sessionLog) -->
  <script src="js/views/drill-library.js"></script>   <!-- child of Programs (#/programs/drills) -->
  <script src="js/views/program-builder.js"></script> <!-- child of Programs (#/programs/new|edit) -->
  <script src="js/views/programs.js"></script>        <!-- nav 4: Programs hub -->
  <script src="js/views/program-wizard.js"></script>  <!-- hidden: program generator (#/generate/<playerId>) -->
  <script src="js/views/season.js"></script>          <!-- child of Games -->
  <script src="js/views/games.js"></script>           <!-- nav 5: Games (+ Season tab) -->
  <script src="js/views/armsafety.js"></script>       <!-- nav 6: Arm Safety (+ #/armsafety/checkin) -->
  <script src="js/views/player.js"></script>          <!-- hidden: player profile -->
  <script src="js/views/alerts.js"></script>          <!-- hidden page + CT.alerts.build for the bell -->
</body>
</html>
