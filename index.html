<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1b0e" />
  <meta name="description" content="Coach Tracker — a baseball coaching client and progress tracker. Built by Zachary LeCroy to manage real coaching clients." />
  <title>Coach Tracker — Baseball Coaching Client & Progress Tracker</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="topnav">
    <div class="topnav-inner">
      <a class="brand" href="#/" aria-label="Coach Tracker home">
        <span class="brand-mark" aria-hidden="true">&#9918;</span>
        <span class="brand-name">Coach Tracker</span>
        <span id="demo-badge" class="demo-badge" hidden>Demo data</span>
      </a>
      <a class="portfolio-link" href="https://github.com/zacklecroy" target="_blank" rel="noopener noreferrer">Back to portfolio &rarr;</a>
    </div>
  </nav>

  <main id="view" class="view" aria-live="polite">
    <!-- Views are rendered here by js/app.js -->
  </main>

  <!-- Modal host -->
  <div id="modal-root"></div>

  <!-- Toast host -->
  <div id="toast-root" class="toast-root" aria-live="assertive"></div>

  <footer class="site-footer">
    <p>Coach Tracker &middot; built by Zachary LeCroy &middot; data stays in your browser (localStorage)</p>
  </footer>

  <!-- Chart.js from CDN (no build step) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- App scripts: small, feature-focused files -->
  <script src="js/constants.js"></script>
  <script src="js/sample-data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/io.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/players.js"></script>
  <script src="js/sessions.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
